name: air learn (reusable)

# REUSABLE out-of-band learn — runs headless learn for ONE repo's pattern store,
# off the PR critical path (autonomy "Option A").
#
# PUBLIC/CORPORATE BOUNDARY (load-bearing): this is the public air repo. It holds
# only the reusable workflow CODE — it NEVER enumerates the corporate fleet and
# never carries a fleet-wide token. A run is ALWAYS scoped to a SINGLE repo:
#   * called by a PRIVATE fleet repo (workflow_call) → that repo learns its OWN
#     store + pushes its OWN wiki, using ITS OWN secrets (the same
#     ANTHROPIC_API_KEY / AIR_BOT_TOKEN it already uses for reviews); or
#   * dispatched on THIS repo (workflow_dispatch) → scoped to air's own store only.
# The corporate fleet's scheduled learn lives in each PRIVATE repo's own caller
# (see managed/air-learn-cron.caller.yml.example), so no corporate credential and
# no fleet reach ever sits on this public repo.
#
# TRIAL-SAFE: mode 'list' enumerates the (single) repo's due-ness with ZERO model
# calls; 'dry-run' curates + makes model calls but writes NOTHING; 'live' is the
# real curation (needs AIR_BOT_TOKEN to push the wiki mirror). The private caller
# picks the mode (default 'list') and goes live per-repo on its own schedule.

on:
  workflow_call:
    inputs:
      repo:
        description: 'owner/repo to learn (its OWN store). Empty → the calling repo.'
        required: false
        type: string
        default: ''
      mode:
        description: 'list (enumerate only, $0) | dry-run (curate, write nothing) | live (real curation)'
        required: false
        type: string
        default: 'list'
      air_ref:
        description: 'air repo ref for the code checkout (default main; override only when benchmarking a branch).'
        required: false
        type: string
        default: 'main'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      AIR_BOT_TOKEN:
        description: 'Only needed for mode=live (pushes the wiki mirror). Omit for list/dry-run.'
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scoped to THIS repo (air) only — never the fleet.'
        type: choice
        options: [list, dry-run, live]
        default: list

# One learn at a time per repo; a long run never stacks on the next tick.
concurrency:
  group: air-learn-${{ github.repository }}
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Always run THIS (air) repo's code, regardless of which repo called us.
      - uses: actions/checkout@v4
        with:
          repository: VorobiovD/air
          ref: ${{ inputs.air_ref || 'main' }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r managed/requirements.txt
      - name: Run scoped learn
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          AIR_LEARN_BATCH: ${{ vars.AIR_LEARN_BATCH }}
          # Per-repo learn cadence. Unset → 15 (the default). A repo curating
          # out-of-band can afford a tighter count; MUST match the value on the
          # review caller, or the two paths disagree on when a repo is due.
          AIR_LEARN_REVIEWS_THRESHOLD: ${{ vars.AIR_LEARN_REVIEWS_THRESHOLD }}
          # inputs via env (NOT inline ${{ }} in run:) to avoid shell injection
          IN_REPO: ${{ inputs.repo }}
          IN_MODE: ${{ inputs.mode }}
          THIS_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "${IN_MODE:-list}" in
            live)             MODE="" ;;
            dry-run|dry_run)  MODE="--dry-run" ;;
            *)                MODE="--list" ;;
          esac
          # Resolve the single target repo. NEVER run unscoped (no fleet enumeration).
          REPO="${IN_REPO:-}"; [ -n "$REPO" ] || REPO="$THIS_REPO"
          [ -n "$REPO" ] || { echo "::error::air-learn: no repo resolved — refusing to run unscoped"; exit 1; }
          echo "running: python managed/learn_cron.py $MODE --repos $REPO"
          python managed/learn_cron.py $MODE --repos "$REPO"

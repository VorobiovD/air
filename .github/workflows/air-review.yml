# Dogfood: air reviews its own PRs via the Managed Agent.
# Uses the reusable workflow in this same repo (pinned to @main so PRs can't
# modify the review logic that reviews them).

name: air review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (works on closed/merged PRs)'
        required: true
        type: number
      closed:
        description: 'Allow review of closed/merged PR'
        required: false
        type: boolean
        default: true

jobs:
  review:
    uses: VorobiovD/air/.github/workflows/managed-review.yml@main
    with:
      pr_number: ${{ inputs.pr_number }}
      closed: ${{ inputs.closed }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}

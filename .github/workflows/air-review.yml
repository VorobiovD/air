# Dogfood: air reviews its own PRs via the Managed Agent.
# Uses the reusable workflow in this same repo (pinned to @main so PRs can't
# modify the review logic that reviews them).
#
# Trigger model: review-on-request. The workflow only fires when the
# `air-machine` bot account is explicitly requested as a reviewer on the
# PR. Pushing commits / opening / reopening PRs does NOT auto-trigger.
# This avoids burning a $4-9 review every push during active development.
# To trigger: open the PR's "Reviewers" panel and select `air-machine`,
# or run workflow_dispatch (Actions tab → "air review" → Run workflow).

name: air review

on:
  pull_request:
    types: [review_requested]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (works on closed/merged PRs)'
        required: true
        type: string
      closed:
        description: 'Allow review of closed/merged PR'
        required: false
        type: string
        default: 'true'
      no_codex:
        description: 'Skip Codex even if OPENAI_API_KEY is set'
        required: false
        type: string
        default: 'false'
      fresh:
        description: 'Force a full review even if already reviewed at HEAD (replays/verification)'
        required: false
        type: string
        default: 'false'
      air_ref:
        description: 'air branch for the driver/prompts checkout (A/B validation of feature branches; default main)'
        required: false
        type: string
        default: 'main'

jobs:
  review:
    # On `review_requested`, fire only when the `air-machine` bot is the
    # requested reviewer — requesting human reviewers must not trigger the
    # paid review. workflow_dispatch has no requested_reviewer field, so
    # the OR condition lets manual runs through unconditionally.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.requested_reviewer.login == 'air-machine' }}
    uses: VorobiovD/air/.github/workflows/managed-review.yml@main
    with:
      # Reusable declares these as `type: string` so we can pass expression
      # results directly — `${{ inputs.X }}` resolves to a string, and typed
      # reusable inputs reject strings at workflow-load time.
      pr_number: ${{ inputs.pr_number }}
      closed: ${{ inputs.closed }}
      no_codex: ${{ inputs.no_codex }}
      fresh: ${{ inputs.fresh }}
      # workflow_dispatch only; review_requested events carry no inputs, and
      # an explicit empty string would OVERRIDE the reusable default — hence
      # the || guard. The driver + prompts come from this checkout, so a
      # feature branch can be validated against a real PR without touching main.
      air_ref: ${{ inputs.air_ref || 'main' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

name: drift checks

# Runs .air-checks.sh (Checks A–I: version mirrors, gate-anchor lockstep,
# frozen-contract locks) in CI. Locally the same script runs via the
# pre-commit hook — but only for Claude-driven commits in a trusted clone;
# a PR authored outside Claude Code, a `git commit --no-verify`, or a
# GitHub-web edit skips it entirely. This job closes that gap: the checks
# gate the PR regardless of how the commit was made. Stdlib-only (bash +
# python3 + grep), no deps, ~seconds.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run .air-checks.sh
        # AIR_PLUGIN_ROOT points the script at the in-repo plugin (same as the
        # hook's export); the checked-out modes keep both scripts executable.
        run: AIR_PLUGIN_ROOT="$GITHUB_WORKSPACE/plugins/air" bash .air-checks.sh

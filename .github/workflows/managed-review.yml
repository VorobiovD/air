# Reusable workflow for automated air reviews via Managed Agents.
#
# Teams add this to their repo:
#
#   name: air review
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#       # ^ push-driven: every push re-reviews; bursts coalesce via the
#       #   cooldown_minutes input (default 20). For the cheaper
#       #   request-driven variant (review only when the bot is requested
#       #   as reviewer; /air:review --respond re-requests automatically),
#       #   see managed/README.md "Enable on a repo".
#     workflow_dispatch:
#       inputs:
#         pr_number:
#           description: 'PR number to review'
#           required: true
#           type: string
#         closed:
#           description: 'Allow review of closed/merged PRs'
#           required: false
#           type: string
#           default: 'true'
#         no_codex:
#           description: 'Skip Codex even if OPENAI_API_KEY is set'
#           required: false
#           type: string
#           default: 'false'
#   jobs:
#     review:
#       uses: VorobiovD/air/.github/workflows/managed-review.yml@main
#       with:
#         pr_number: ${{ inputs.pr_number }}
#         closed: ${{ inputs.closed }}
#         no_codex: ${{ inputs.no_codex }}
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # optional — enables Codex
#
# All inputs are `type: string` (not number/boolean) because GitHub's
# expression operator `${{ ... }}` always resolves to a string — passing
# that to a typed reusable input fails at workflow-load time. The shell
# script below handles the conversion naturally.
#
# For pull_request triggers, leave `pr_number` / `closed` unset — the
# reusable workflow falls back to `github.event.pull_request.number` and
# skips `--closed`.
#
# Codex (optional 5th reviewer): set `OPENAI_API_KEY` as a repo/org secret
# to enable. Without it, the review runs with 4 Claude specialists +
# verifier only (behavior unchanged from v1.8.0).
#
# Cross-repo benchmarking: when pinning the `uses:` line at a non-main
# air branch (e.g. `@feat/...`), pass `air_ref` with the same value so
# setup.py reads agent frontmatter from the same branch the reusable
# workflow loaded from — otherwise setup.py reads main's frontmatter
# and reverts any feature-branch model-tier changes mid-run.

name: air managed review

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review (falls back to github.event.pull_request.number when empty)'
        required: false
        type: string
        default: ''
      closed:
        description: 'Allow review of closed/merged PRs — set to "true" to pass --closed to review.py'
        required: false
        type: string
        default: 'false'
      no_codex:
        description: 'Skip Codex even when OPENAI_API_KEY is set — set to "true" to pass --no-codex'
        required: false
        type: string
        default: 'false'
      fresh:
        description: |
          Force a full review even when the PR is already reviewed at its
          current HEAD — set to "true" to pass --fresh to review.py.
          Needed for manual replays on closed/merged PRs (verification
          runs, benchmarks): those are normally skipped by the
          "already reviewed, no changes since" gate.
        required: false
        type: string
        default: 'false'
      agent_versions:
        description: |
          Optional JSON map pinning agent versions, e.g.
          '{"air-code-reviewer": N, "air-simplify": N, "air-security-auditor": N,
            "air-git-history-reviewer": N, "air-review-verifier": N, "air-coordinator": N}'
          with N taken from the target air release's notes.
          Pinned agents skip prompt sync entirely and sessions reference the
          pinned version — work repos pin the blessed set published in each
          air release's notes and bump deliberately; leave empty to float on
          latest (the air repo's own posture). Pin the WHOLE set from one
          release: a pinned coordinator's sub-agent roster is whatever its
          pinned version recorded, so mixing pinned and floating agents
          across releases skews the roster. Malformed JSON, unknown agent
          names, or non-integer versions fail the run loudly before any
          session spend.
        required: false
        type: string
        default: ''
      air_ref:
        description: |
          air repo ref for the setup.py + agent prompts checkout. Defaults
          to `main` for production. Override only when benchmarking a
          feature branch — setup.py reads agent frontmatter and syncs to
          Anthropic, so `air_ref` MUST point at the same air branch the
          caller's `uses:` line pins. Otherwise setup.py reads main's
          frontmatter and silently reverts any model-tier changes that
          exist only on the feature branch (qai-be benchmark surfaced
          this when `uses: ...managed-review.yml@feat/...` ran setup.py
          against main's frontmatter and resynced specialists from the
          test tier back to production tier).
        required: false
        type: string
        default: 'main'
      cooldown_minutes:
        description: |
          Minimum minutes between reviews of the same PR on push
          (`synchronize`) triggers. A push landing inside the window
          sleeps out the remainder first; a newer push during the sleep
          cancels the run via the concurrency group at zero session
          cost, so fix-commit bursts coalesce into one review of the
          final state. First reviews (opened/ready_for_review), explicit
          review_requested, and workflow_dispatch are never delayed.
          '0' disables. Default 20 — in the May 2026 sample (301 review
          sessions at ~$5-9 each), roughly a third were burst re-reviews.
          Values above 20 eat into the review headroom inside the job's
          95-minute cap (75 review budget + 20 cooldown).
        required: false
        type: string
        default: '20'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      AIR_BOT_TOKEN:
        required: true
      OPENAI_API_KEY:
        description: 'Optional — enables Codex as a 5th reviewer alongside the 4 Claude specialists'
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    # Coalesce rapid-fire pushes on the same PR. When a developer pushes
    # several commits in quick succession (typing nits, fixing CI), the
    # earlier reviews get cancelled and only the most recent push runs
    # to completion. Without this, every push fires a fresh ~30-min
    # review even if the next push lands 2 minutes later — svc-transcribe
    # #37 logged 14 sequential reviews on what could have been 5-6.
    #
    # Group keyed on (repository, PR number) so cross-repo callers and
    # cross-PR concurrent runs don't collide. The third segment falls
    # back through pr_number → pull_request.number → run_id so the
    # exotic case (workflow_dispatch with no pr_number AND no PR event
    # payload) doesn't silently bucket every dispatched run together.
    # PR_NUMBER_RESOLVED below uses the first two fallbacks for the
    # actual review work; the run_id tail here is purely a defensive
    # last-resort to keep concurrency groups unique.
    #
    # `cancel-in-progress: true` SIGKILLs the in-flight run when a
    # newer one queues. There's a small inconsistency window where the
    # in-flight job has POSTed the review comment but not yet POSTed
    # the verdict (`submit_review_verdict`) — coalescing during that
    # window leaves the PR with a finding-list comment but no formal
    # APPROVE/REQUEST_CHANGES state. Branch protection lags one round
    # until the next push triggers a fresh review. This is acceptable
    # for the rapid-iteration pattern this concurrency rule targets;
    # on slower cadences the verdict completes before the next push.
    #
    # The "Cooldown debounce" first step below extends this coalescing
    # to pushes that land AFTER a review finished: the new run sleeps
    # out the cooldown remainder before spending anything, so a
    # follow-up push cancels it here at $0 instead of mid-session.
    concurrency:
      group: air-review-${{ github.repository }}-${{ inputs.pr_number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    # Budget: codex (≤10 min, SESSION_TIMEOUT_SECS) + coordinator (≤45 min,
    # COORDINATOR_TIMEOUT_SECS = 2700s) + learn epilogue (~3-5 min when
    # the wiki-counter threshold fires) = 58-60 min worst case. 60 min
    # was tight after qai-be #593 hit 28m13s on a re-review (~3.5K lines)
    # and the coordinator gradient with 1680s left no margin. 75 min
    # gave ~15 min of headroom for slow wiki clones, rebase-retry on
    # the wiki push, and learn-side specialist sessions. The cooldown
    # debounce step can additionally sleep up to cooldown_minutes
    # (default 20) BEFORE the paid work on the same job clock — without
    # widening the cap, a solo push inside the window would sleep 20m
    # and then get SIGKILLed mid-session on a worst-case review (full-
    # cost loss). 95 = 75 review budget + 20 default cooldown; callers
    # raising cooldown_minutes above 20 eat into review headroom.
    timeout-minutes: 95

    # Job-level env so step-level `if:` can check `env.OPENAI_API_KEY != ''`.
    # Step-level `if: secrets.X != ''` works in some contexts but is less
    # reliable across reusable-workflow invocations; env-based gating is the
    # well-established pattern.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PR_NUMBER_RESOLVED: ${{ inputs.pr_number || github.event.pull_request.number }}

    steps:
      # Runs FIRST, before any paid work: a run superseded during this
      # sleep dies having spent $0. Gated on `synchronize` only — a push
      # to an already-open PR is the one wasteful trigger; first reviews,
      # explicit review_requested, and workflow_dispatch start
      # immediately. The comment detector uses the anchored
      # `startswith("## Code Review\n")` form (BOT_REVIEW_PREFIXES in
      # lib/pr_conversation.py — the trailing \n rejects "## Code
      # Reviewers Guide" lookalikes) and the desc/first fetch shape from
      # review-respond.md Step 1.5 (newest comment is on page 1, no
      # pagination). It also excludes the structured "## air review
      # (run failed)" comment, so a failed run never holds the cooldown.
      # The selector is any-author by design (the workflow can't know
      # the bot login) — worst case a spoofed comment delays a push-
      # triggered review by one window; fail direction is always
      # "review runs", never "review suppressed".
      - name: Cooldown debounce
        if: ${{ github.event.action == 'synchronize' && inputs.cooldown_minutes != '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          COOLDOWN_MIN: ${{ inputs.cooldown_minutes }}
        run: |
          case "$COOLDOWN_MIN" in
            (*[!0-9]*|'') echo "cooldown: non-numeric cooldown_minutes '$COOLDOWN_MIN' — skipping debounce"; exit 0;;
          esac
          LAST=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER_RESOLVED}/comments?sort=created&direction=desc&per_page=100" \
                 --jq '[.[] | select(.body | startswith("## Code Review\n"))] | first | .created_at // empty' 2>/dev/null || true)
          if [ -z "$LAST" ]; then
            echo "cooldown: no prior review comment — starting immediately"
            exit 0
          fi
          NOW=$(date -u +%s)
          THEN=$(date -u -d "$LAST" +%s 2>/dev/null) || { echo "cooldown: unparseable timestamp '$LAST' — starting immediately"; exit 0; }
          COOLDOWN_S=$(( COOLDOWN_MIN * 60 ))
          ELAPSED=$(( NOW - THEN ))
          WAIT=$(( COOLDOWN_S - ELAPSED ))
          if [ "$WAIT" -le 0 ]; then
            echo "cooldown: last review $((ELAPSED/60))m ago (>= ${COOLDOWN_MIN}m) — starting immediately"
            exit 0
          fi
          # Clamp guards future-dated created_at (clock skew) — never sleep past one window.
          [ "$WAIT" -gt "$COOLDOWN_S" ] && WAIT=$COOLDOWN_S
          echo "cooldown: last review $((ELAPSED/60))m ago — sleeping $((WAIT/60))m$((WAIT%60))s (a newer push supersedes this run at \$0)"
          sleep "$WAIT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic requests

      # `actions/checkout@v4` defaults to the default branch when
      # `repository:` is set to a different repo than the caller's. For
      # cross-repo benchmarking (e.g., qai-be → air@feature-branch) the
      # caller must pass `air_ref` as an input so setup.py reads agent
      # frontmatter from the SAME air ref that the reusable workflow
      # was loaded from — otherwise setup.py syncs main's frontmatter
      # to the live agents and silently reverts any feature-branch
      # model-tier changes. github.workflow_ref returns the CALLER's
      # ref inside a reusable workflow (not the reusable's own), so
      # there's no built-in way to derive this — must be an explicit
      # input.
      - name: Checkout air repo (for setup.py + agent prompts)
        uses: actions/checkout@v4
        with:
          repository: VorobiovD/air
          path: air
          ref: ${{ inputs.air_ref }}

      # Always check out the target repo — Codex needs it (when enabled),
      # AND review.py uses it for client-side pre-computation (blame /
      # churn / diff-check / file-status summaries embedded in the PR
      # Context, so specialists don't burn tool round-trips re-deriving
      # them from inside their containers). Gate only on
      # PR_NUMBER_RESOLVED — without a PR number `refs/pull//head` is
      # invalid. Codex install + login below stays gated on OPENAI_API_KEY
      # (no point installing the CLI if it won't run).
      - name: Checkout target repo (for Codex + pre-computation)
        if: ${{ env.PR_NUMBER_RESOLVED != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          # refs/pull/<N>/head is always reachable — works for open PRs,
          # merged PRs (branch often deleted), and synchronize races.
          ref: refs/pull/${{ env.PR_NUMBER_RESOLVED }}/head
          path: target-repo
          fetch-depth: 0
          # Authenticate as the bot, not GITHUB_TOKEN. Callers using
          # least-privilege `permissions: {}` (per the example in the
          # docblock above) zero out GITHUB_TOKEN — actions/checkout's
          # default fallback then 404s with "Repository not found"
          # against the caller's own repo. The Run review step below
          # already authenticates with AIR_BOT_TOKEN; mirror it here so
          # the docblock's "the reusable workflow authenticates via
          # AIR_BOT_TOKEN" promise is true at every checkout site.
          # Diagnosed against qai-be PR #593 — every bot-review run
          # failed identically here regardless of which PAT was in
          # AIR_BOT_TOKEN, because this step never read it.
          token: ${{ secrets.AIR_BOT_TOKEN }}

      - name: Install Codex CLI
        if: ${{ env.OPENAI_API_KEY != '' && inputs.no_codex != 'true' && env.PR_NUMBER_RESOLVED != '' }}
        run: |
          # Pin version — global install executes unknown code as the
          # runner user, which has all secrets (including the repo-scope
          # bot PAT) in env. Bump deliberately after reviewing releases.
          npm install -g @openai/codex@0.124.0
          # Headless login — reads key from stdin, stores in ~/.codex/auth.json.
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ env.PR_NUMBER_RESOLVED }}
          CLOSED: ${{ inputs.closed }}
          NO_CODEX: ${{ inputs.no_codex }}
          FRESH: ${{ inputs.fresh }}
          AIR_AGENT_VERSIONS: ${{ inputs.agent_versions }}
          # Absolute path to the local checkout. review.py uses it for
          # both `codex review` (when enabled) and client-side
          # pre-computation (blame/churn/file-status/diff-check
          # summaries embedded in the PR Context). Set whenever the
          # target-repo checkout step ran (PR_NUMBER_RESOLVED != '');
          # empty otherwise so review.py skips both legs gracefully.
          AIR_TARGET_REPO: ${{ env.PR_NUMBER_RESOLVED != '' && format('{0}/target-repo', github.workspace) || '' }}
        run: |
          cd air
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR number available. Pass pr_number via workflow_dispatch or use a pull_request trigger." >&2
            exit 1
          fi
          FLAGS=()
          if [ "$CLOSED" = "true" ]; then
            FLAGS+=(--closed)
          fi
          if [ "$NO_CODEX" = "true" ]; then
            FLAGS+=(--no-codex)
          fi
          if [ "$FRESH" = "true" ]; then
            FLAGS+=(--fresh)
          fi
          python managed/review.py "$REPO" "$PR_NUMBER" "${FLAGS[@]}"

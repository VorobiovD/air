# Reusable workflow for automated air reviews via Managed Agents.
#
# Teams add this to their repo:
#
#   name: air review
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#     workflow_dispatch:
#       inputs:
#         pr_number:
#           description: 'PR number to review'
#           required: true
#           type: string
#         closed:
#           description: 'Allow review of closed/merged PRs'
#           required: false
#           type: string
#           default: 'true'
#   jobs:
#     review:
#       uses: VorobiovD/air/.github/workflows/managed-review.yml@main
#       with:
#         pr_number: ${{ inputs.pr_number }}
#         closed: ${{ inputs.closed }}
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
#
# All inputs are `type: string` (not number/boolean) because GitHub's
# expression operator `${{ ... }}` always resolves to a string — passing
# that to a typed reusable input fails at workflow-load time. The shell
# script below handles the conversion naturally.
#
# For pull_request triggers, leave `pr_number` / `closed` unset — the
# reusable workflow falls back to `github.event.pull_request.number` and
# skips `--closed`.

name: air managed review

on:
  workflow_call:
    inputs:
      # Typed as `string` rather than `number`/`boolean` so callers can pass
      # `${{ inputs.pr_number }}` from their own workflow_dispatch inputs
      # directly — GitHub expressions always resolve to strings, and a
      # `type: number` reusable input rejects string values at workflow-load
      # time. The shell script below handles the conversion naturally.
      pr_number:
        description: 'PR number to review (falls back to github.event.pull_request.number when empty)'
        required: false
        type: string
        default: ''
      closed:
        description: 'Allow review of closed/merged PRs — set to "true" to pass --closed to review.py'
        required: false
        type: string
        default: 'false'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      AIR_BOT_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Checkout air repo (for setup.py + agent prompts)
        uses: actions/checkout@v4
        with:
          repository: VorobiovD/air
          path: air

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
          CLOSED: ${{ inputs.closed }}
        run: |
          cd air
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR number available. Pass pr_number via workflow_dispatch or use a pull_request trigger." >&2
            exit 1
          fi
          FLAGS=""
          if [ "$CLOSED" = "true" ]; then
            FLAGS="--closed"
          fi
          python managed/review.py "$REPO" "$PR_NUMBER" $FLAGS

# Reusable workflow for automated air reviews via Managed Agents.
#
# Teams add this to their repo:
#
#   name: air review
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#       # ^ push-driven: every push re-reviews; bursts coalesce via the
#       #   cooldown_minutes input (default 20). For the cheaper
#       #   request-driven variant (review only when the bot is requested
#       #   as reviewer; /air:review --respond re-requests automatically),
#       #   see managed/README.md "Enable on a repo".
#     workflow_dispatch:
#       inputs:
#         pr_number:
#           description: 'PR number to review'
#           required: true
#           type: string
#         closed:
#           description: 'Allow review of closed/merged PRs'
#           required: false
#           type: string
#           default: 'true'
#         no_codex:
#           description: 'Skip Codex even if OPENAI_API_KEY is set'
#           required: false
#           type: string
#           default: 'false'
#   jobs:
#     review:
#       uses: VorobiovD/air/.github/workflows/managed-review.yml@main
#       with:
#         pr_number: ${{ inputs.pr_number }}
#         closed: ${{ inputs.closed }}
#         no_codex: ${{ inputs.no_codex }}
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
#         OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # optional — enables Codex
#
# All inputs are `type: string` (not number/boolean) because GitHub's
# expression operator `${{ ... }}` always resolves to a string — passing
# that to a typed reusable input fails at workflow-load time. The shell
# script below handles the conversion naturally.
#
# For pull_request triggers, leave `pr_number` / `closed` unset — the
# reusable workflow falls back to `github.event.pull_request.number` and
# skips `--closed`.
#
# Codex (optional 5th reviewer): set `OPENAI_API_KEY` as a repo/org secret
# to enable. Without it, the review runs with 4 Claude specialists +
# verifier only (behavior unchanged from v1.8.0).
#
# Cross-repo benchmarking: when pinning the `uses:` line at a non-main
# air branch (e.g. `@feat/...`), pass `air_ref` with the same value so
# setup.py reads agent frontmatter from the same branch the reusable
# workflow loaded from — otherwise setup.py reads main's frontmatter
# and reverts any feature-branch model-tier changes mid-run.

name: air managed review

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review (falls back to github.event.pull_request.number when empty)'
        required: false
        type: string
        default: ''
      closed:
        description: 'Allow review of closed/merged PRs — set to "true" to pass --closed to review.py'
        required: false
        type: string
        default: 'false'
      no_codex:
        description: 'Skip Codex even when OPENAI_API_KEY is set — set to "true" to pass --no-codex'
        required: false
        type: string
        default: 'false'
      fresh:
        description: |
          Force a full review even when the PR is already reviewed at its
          current HEAD — set to "true" to pass --fresh to review.py.
          Needed for manual replays on closed/merged PRs (verification
          runs, benchmarks): those are normally skipped by the
          "already reviewed, no changes since" gate.
        required: false
        type: string
        default: 'false'
      agent_versions:
        description: |
          Optional JSON map pinning agent versions, e.g.
          '{"air-code-reviewer": N, "air-simplify": N, "air-security-auditor": N,
            "air-git-history-reviewer": N, "air-ui-copy-reviewer": N,
            "air-review-verifier": N, "air-coordinator": N}'
          with N taken from the target air release's notes. Pin the WHOLE blessed
          set — setup.py aborts if air-coordinator is pinned but a specialist isn't.
          Pinned agents skip prompt sync entirely and sessions reference the
          pinned version — work repos pin the blessed set published in each
          air release's notes and bump deliberately; leave empty to float on
          latest (the air repo's own posture). Pin the WHOLE set from one
          release: a pinned coordinator's sub-agent roster is whatever its
          pinned version recorded, so mixing pinned and floating agents
          across releases skews the roster. Malformed JSON, unknown agent
          names, or non-integer versions fail the run loudly before any
          session spend.
        required: false
        type: string
        default: ''
      air_ref:
        description: |
          air repo ref for the setup.py + agent prompts checkout. Defaults
          to `main` for production. Override only when benchmarking a
          feature branch — setup.py reads agent frontmatter and syncs to
          Anthropic, so `air_ref` MUST point at the same air branch the
          caller's `uses:` line pins. Otherwise setup.py reads main's
          frontmatter and silently reverts any model-tier changes that
          exist only on the feature branch (repo-A benchmark surfaced
          this when `uses: ...managed-review.yml@feat/...` ran setup.py
          against main's frontmatter and resynced specialists from the
          test tier back to production tier).
        required: false
        type: string
        default: 'main'
      cooldown_minutes:
        description: |
          Minimum minutes between reviews of the same PR on push
          (`synchronize`) triggers. A push landing inside the window
          sleeps out the remainder first; a newer push during the sleep
          cancels the run via the concurrency group at zero session
          cost, so fix-commit bursts coalesce into one review of the
          final state. First reviews (opened/ready_for_review), explicit
          review_requested, and workflow_dispatch are never delayed.
          '0' disables. Default 20 — in the May 2026 sample (301 review
          sessions at ~$5-9 each), roughly a third were burst re-reviews.
          Values above 20 eat into the review headroom inside the job's
          95-minute cap (75 review budget + 20 cooldown).
        required: false
        type: string
        default: '20'
      expected_reviewer:
        description: |
          Optional identity assertion for the multi-reviewer PAT model.
          Pass the GitHub LOGIN of the human requested as reviewer (e.g.
          'alice') — NOT the friendly secret stem. Before any review
          spend, review.py resolves the AIR_BOT_TOKEN owner (GET /user) and
          fails loud (::error::, exit 1) unless it equals this login
          (case-insensitive) — catching a wrong PAT pasted into a reviewer's
          <STEM>_PAT secret, which would otherwise post under the wrong
          identity silently. Empty (default) => no assertion; legacy
          single-token and SHA-pinned callers behave byte-for-byte as before.
        required: false
        type: string
        default: ''
      requested_reviewer:
        description: |
          Optional, NAMING-ONLY (distinct from expected_reviewer — it never
          asserts and never blocks). Pass the GitHub LOGIN of the requested
          reviewer so the auth-preflight + bot-fallback messages can NAME whose
          PAT is missing/expired ("air: @alice's review token … — add/rotate via
          air-rotate") instead of a generic "the review token". Unlike
          expected_reviewer it is passed even when the reviewer's <STEM>_PAT is
          ABSENT — the case worth surfacing. Empty (default) => unnamed messages,
          byte-identical to before.
        required: false
        type: string
        default: ''
      review_mode:
        description: |
          Review architecture (opt-in): 'full' (default — the 6-agent
          coordinator), 'solo' (one merged-lens agent — ~70% cheaper/faster
          but NOT gate-safe: it can downgrade a blocker's severity, so use
          only where an advisory review is acceptable), or 'messages-api'
          (EXPERIMENTAL — air self-hosts the agent loop client-side instead of
          a managed session, eliminating the runtime's between-turn scheduling
          stall; supports fresh + same-PR re-review + the learn-counter
          write-back; uses the same checkout at AIR_TARGET_REPO). Default
          'full' is byte-identical to today. Set
          per-request via workflow_dispatch, or persistently by setting a
          repo/org VARIABLE `AIR_REVIEW_MODE` on the CALLER repo (it wins over
          this input — handy for running 'messages-api' over a
          window with no workflow edit; delete it to revert).
        required: false
        type: string
        default: 'full'
      promote_fastpath:
        description: |
          Opt-in cost saver for promote chains. When 'true', a fresh
          promote/staging-to-main-* PR with no prior review of its own is
          re-reviewed as a delta against its last-merged, already-reviewed
          sibling promote (instead of a full re-read) — but only when the two
          overlap by >= 80% of changed lines; below that it falls back to a
          full review. Default 'false' is byte-identical to today. Enable only
          on repos that use the promote/staging-to-main-* branch convention.
          NOTE: you don't need to pass this input at all — setting a repo (or
          org) VARIABLE `AIR_PROMOTE_FASTPATH=true` on the CALLER repo enables
          it too (vars flow from the caller into this reusable workflow), so a
          caller can toggle it from Settings → Variables with no workflow edit.
          This input OR the variable being 'true' turns it on.
        required: false
        type: string
        default: 'false'
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      AIR_BOT_TOKEN:
        required: true
      OPENAI_API_KEY:
        description: 'Optional — enables Codex as a 5th reviewer alongside the 4 Claude specialists'
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    # Coalesce rapid-fire pushes on the same PR. When a developer pushes
    # several commits in quick succession (typing nits, fixing CI), the
    # earlier reviews get cancelled and only the most recent push runs
    # to completion. Without this, every push fires a fresh ~30-min
    # review even if the next push lands 2 minutes later — repo-D
    # #37 logged 14 sequential reviews on what could have been 5-6.
    #
    # Group keyed on (repository, PR number) so cross-repo callers and
    # cross-PR concurrent runs don't collide. The third segment falls
    # back through pr_number → pull_request.number → run_id so the
    # exotic case (workflow_dispatch with no pr_number AND no PR event
    # payload) doesn't silently bucket every dispatched run together.
    # PR_NUMBER_RESOLVED below uses the first two fallbacks for the
    # actual review work; the run_id tail here is purely a defensive
    # last-resort to keep concurrency groups unique.
    #
    # `cancel-in-progress: true` SIGKILLs the in-flight run when a
    # newer one queues. There's a small inconsistency window where the
    # in-flight job has POSTed the review comment but not yet POSTed
    # the verdict (`submit_review_verdict`) — coalescing during that
    # window leaves the PR with a finding-list comment but no formal
    # APPROVE/REQUEST_CHANGES state. Branch protection lags one round
    # until the next push triggers a fresh review. This is acceptable
    # for the rapid-iteration pattern this concurrency rule targets;
    # on slower cadences the verdict completes before the next push.
    #
    # The "Cooldown debounce" first step below extends this coalescing
    # to pushes that land AFTER a review finished: the new run sleeps
    # out the cooldown remainder before spending anything, so a
    # follow-up push cancels it here at $0 instead of mid-session.
    concurrency:
      group: air-review-${{ github.repository }}-${{ inputs.pr_number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    # Budget: codex (≤10 min, SESSION_TIMEOUT_SECS) + coordinator (≤45 min,
    # COORDINATOR_TIMEOUT_SECS = 2700s) + learn epilogue (~3-5 min when
    # the wiki-counter threshold fires) = 58-60 min worst case. 60 min
    # was tight after repo-A #593 hit 28m13s on a re-review (~3.5K lines)
    # and the coordinator gradient with 1680s left no margin. 75 min
    # gave ~15 min of headroom for slow wiki clones, rebase-retry on
    # the wiki push, and learn-side specialist sessions. The cooldown
    # debounce step can additionally sleep up to cooldown_minutes
    # (default 20) BEFORE the paid work on the same job clock — without
    # widening the cap, a solo push inside the window would sleep 20m
    # and then get SIGKILLed mid-session on a worst-case review (full-
    # cost loss). 95 = 75 review budget + 20 default cooldown; callers
    # raising cooldown_minutes above 20 eat into review headroom.
    timeout-minutes: 95

    # Job-level env so step-level `if:` can check `env.OPENAI_API_KEY != ''`.
    # Step-level `if: secrets.X != ''` works in some contexts but is less
    # reliable across reusable-workflow invocations; env-based gating is the
    # well-established pattern.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PR_NUMBER_RESOLVED: ${{ inputs.pr_number || github.event.pull_request.number }}

    steps:
      # Runs FIRST, before any paid work: a run superseded during this
      # sleep dies having spent $0. Gated on `synchronize` only — a push
      # to an already-open PR is the one wasteful trigger; first reviews,
      # explicit review_requested, and workflow_dispatch start
      # immediately. The comment detector uses the anchored
      # `startswith("## Code Review\n")` form (BOT_REVIEW_PREFIXES in
      # lib/pr_conversation.py — the trailing \n rejects "## Code
      # Reviewers Guide" lookalikes) and the desc/first fetch shape from
      # review-respond.md Step 1.5 (newest comment is on page 1, no
      # pagination). It also excludes the structured "## air review
      # (run failed)" comment, so a failed run never holds the cooldown.
      # The selector is any-author by design (the workflow can't know
      # the bot login) — worst case a spoofed comment delays a push-
      # triggered review by one window; fail direction is always
      # "review runs", never "review suppressed".
      - name: Auth preflight (fail $0 on a missing / expired / no-access review token)
        # A missing/expired/no-access review PAT otherwise dies with a cryptic
        # git 403 at the target-repo checkout below. Probe GET /repos first:
        # 401/403/404 is a definitive auth failure → fail loud and $0 with an
        # actionable message (GitHub returns 404, not 403, for a private repo a
        # token can't see — an out-of-scope fine-grained PAT or a non-
        # collaborator bot; the caller's own repo always exists, so 404 here can
        # only mean no-access). Any OTHER code (5xx, network) only warns and
        # proceeds, so a flaky GitHub API can never turn this guard into a fleet
        # outage. Scope is deliberately missing/expired/no-access ONLY — we do
        # NOT gate on `permissions.push`: the production <login>_PATs are
        # Contents:RO + Pull-requests:RW, so `push` is false on a perfectly
        # valid review token, and gating on it would false-fail every review.
        # (A read-only token mistakenly pasted as a PAT thus still reaches the
        # post step — a rarer misconfig the 200-check can't safely close without
        # risking that outage.) Runs before checkout/session (and the cooldown
        # sleep) so a doomed run fails instantly; lives in the reusable workflow
        # → every caller repo gets it with no per-repo config.
        env:
          AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          # Naming-only (Tier 1 PAT visibility): who was requested, and whether
          # their own <STEM>_PAT was present (expected_reviewer is set only then).
          REQUESTED_REVIEWER: ${{ inputs.requested_reviewer }}
          EXPECTED_REVIEWER: ${{ inputs.expected_reviewer }}
        run: |
          # Prefix the messages with the named reviewer when the caller passed one
          # (multi-reviewer PAT model) — turns a generic "the review token" into
          # "@alice's review token", so a missing/expired PAT is named + actionable.
          who="the "; [ -n "${REQUESTED_REVIEWER}" ] && who="@${REQUESTED_REVIEWER}'s "
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${AIR_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}" 2>/dev/null || echo 000)
          case "$code" in
            200)
              echo "auth preflight OK — review token can access ${REPO}"
              # Reviewer was requested but their own <STEM>_PAT isn't set (the run
              # fell back to the shared AIR_BOT_TOKEN, which happened to work).
              # Surface it — named, on the PR's Checks tab — but never block.
              if [ -n "${REQUESTED_REVIEWER}" ] && [ -z "${EXPECTED_REVIEWER}" ]; then
                echo "::warning::air: @${REQUESTED_REVIEWER} has no PAT on ${REPO} — reviewing under the shared bot. Add/rotate it via air-rotate to review under your own identity."
              fi
              ;;
            401|403|404) echo "::error::air: ${who}review token for ${REPO} is missing, expired, or has no access (HTTP ${code}). No review ran — \$0 spent. Add/rotate ${who}*_PAT via air-rotate (or fix AIR_BOT_TOKEN / its rotation fan-out)." ; exit 1 ;;
            *) echo "::warning::air: auth preflight got HTTP ${code} for ${REPO} (transient?) — proceeding without blocking." ;;
          esac

      - name: Cooldown debounce
        if: ${{ github.event.action == 'synchronize' && inputs.cooldown_minutes != '0' }}
        env:
          # AIR_BOT_TOKEN, not github.token: a caller running least-privilege
          # `permissions: {}` gives github.token no read on issue comments, and
          # the fetch failure silently disabled the debounce on every push
          # (it looked identical to "no prior review").
          GH_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          COOLDOWN_MIN: ${{ inputs.cooldown_minutes }}
        run: |
          case "$COOLDOWN_MIN" in
            (*[!0-9]*|'') echo "cooldown: non-numeric cooldown_minutes '$COOLDOWN_MIN' — skipping debounce"; exit 0;;
          esac
          if ! command -v jq >/dev/null 2>&1; then
            echo "::warning::air cooldown: jq not available on this runner — debounce skipped"
            exit 0
          fi
          # Capture stderr SEPARATELY — merging it into COMMENTS (2>&1) would
          # let a zero-exit gh notice (deprecation/auth-refresh chatter) prepend
          # non-JSON to the body, breaking the jq parse below → empty LAST →
          # silent "start immediately" (the exact fail-open this step guards).
          GH_ERR="${RUNNER_TEMP:-/tmp}/air-cooldown-gh-err"
          if ! COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER_RESOLVED}/comments?sort=created&direction=desc&per_page=100" 2>"$GH_ERR"); then
            echo "::warning::air cooldown: comment fetch failed (debounce skipped this run): $(cat "$GH_ERR")"
            exit 0
          fi
          # Filter on the bot author, mirroring the Python skip gate
          # (find_prior_review): without it any PR participant could move
          # the debounce window by posting a "## Code Review"-prefixed
          # comment (scheduling-only nuisance, but free to close).
          BOT_LOGIN=$(gh api user --jq .login 2>/dev/null || true)
          LAST=$(printf '%s' "$COMMENTS" | jq -r --arg bot "$BOT_LOGIN" '[.[] | select((.body | startswith("## Code Review\n")) and ($bot == "" or .user.login == $bot))] | first | .created_at // empty' 2>/dev/null || true)
          if [ -z "$LAST" ]; then
            echo "cooldown: no prior review comment — starting immediately"
            exit 0
          fi
          NOW=$(date -u +%s)
          THEN=$(date -u -d "$LAST" +%s 2>/dev/null) || { echo "cooldown: unparseable timestamp '$LAST' — starting immediately"; exit 0; }
          COOLDOWN_S=$(( COOLDOWN_MIN * 60 ))
          ELAPSED=$(( NOW - THEN ))
          WAIT=$(( COOLDOWN_S - ELAPSED ))
          if [ "$WAIT" -le 0 ]; then
            echo "cooldown: last review $((ELAPSED/60))m ago (>= ${COOLDOWN_MIN}m) — starting immediately"
            exit 0
          fi
          # Clamp guards future-dated created_at (clock skew) — never sleep past one window.
          [ "$WAIT" -gt "$COOLDOWN_S" ] && WAIT=$COOLDOWN_S
          echo "cooldown: last review $((ELAPSED/60))m ago — sleeping $((WAIT/60))m$((WAIT%60))s (a newer push supersedes this run at \$0)"
          sleep "$WAIT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        # Pinned (supply-chain, audit S4): an unpinned install would pull the
        # latest release into this job, which holds AIR_BOT_TOKEN + the API
        # keys. This install runs before the air checkout below, so it can't
        # use `-r managed/requirements.txt` — keep these bounds in sync with it.
        run: pip install 'anthropic>=0.116.0,<0.117.0' 'requests>=2.28.0,<3.0.0'

      # `actions/checkout@v4` defaults to the default branch when
      # `repository:` is set to a different repo than the caller's. For
      # cross-repo benchmarking (e.g., repo-A → air@feature-branch) the
      # caller must pass `air_ref` as an input so setup.py reads agent
      # frontmatter from the SAME air ref that the reusable workflow
      # was loaded from — otherwise setup.py syncs main's frontmatter
      # to the live agents and silently reverts any feature-branch
      # model-tier changes. github.workflow_ref returns the CALLER's
      # ref inside a reusable workflow (not the reusable's own), so
      # there's no built-in way to derive this — must be an explicit
      # input.
      - name: Checkout air repo (for setup.py + agent prompts)
        uses: actions/checkout@v4
        with:
          repository: VorobiovD/air
          path: air
          ref: ${{ inputs.air_ref }}

      # Always check out the target repo — Codex needs it (when enabled),
      # AND review.py uses it for client-side pre-computation (blame /
      # churn / diff-check / file-status summaries embedded in the PR
      # Context, so specialists don't burn tool round-trips re-deriving
      # them from inside their containers). Gate only on
      # PR_NUMBER_RESOLVED — without a PR number `refs/pull//head` is
      # invalid. Codex install + login below stays gated on OPENAI_API_KEY
      # (no point installing the CLI if it won't run).
      - name: Checkout target repo (for Codex + pre-computation)
        if: ${{ env.PR_NUMBER_RESOLVED != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          # refs/pull/<N>/head is always reachable — works for open PRs,
          # merged PRs (branch often deleted), and synchronize races.
          ref: refs/pull/${{ env.PR_NUMBER_RESOLVED }}/head
          path: target-repo
          fetch-depth: 0
          # Don't persist the bot PAT into target-repo/.git/config (extraheader) —
          # this checkout is the headless Sandbox root + Codex's tree, both of which
          # read it, so a persisted repo-write PAT there is exfiltrable into a public
          # review comment. Only local reads (blame/log/diff) run against it (no
          # fetch/push needs the cred), so dropping it is safe. Defense-in-depth pairs
          # with tool_exec DENY_GLOBS refusing .git/ internals.
          persist-credentials: false
          # Authenticate as the bot, not GITHUB_TOKEN. Callers using
          # least-privilege `permissions: {}` (per the example in the
          # docblock above) zero out GITHUB_TOKEN — actions/checkout's
          # default fallback then 404s with "Repository not found"
          # against the caller's own repo. The Run review step below
          # already authenticates with AIR_BOT_TOKEN; mirror it here so
          # the docblock's "the reusable workflow authenticates via
          # AIR_BOT_TOKEN" promise is true at every checkout site.
          # Diagnosed against repo-A PR #593 — every bot-review run
          # failed identically here regardless of which PAT was in
          # AIR_BOT_TOKEN, because this step never read it.
          token: ${{ secrets.AIR_BOT_TOKEN }}

      - name: Install Codex CLI
        if: ${{ env.OPENAI_API_KEY != '' && inputs.no_codex != 'true' && env.PR_NUMBER_RESOLVED != '' }}
        run: |
          # Pin version — global install executes unknown code as the
          # runner user, which has all secrets (including the repo-scope
          # bot PAT) in env. Bump deliberately after reviewing releases.
          npm install -g @openai/codex@0.135.0
          # Headless login — reads key from stdin, stores in ~/.codex/auth.json.
          printenv OPENAI_API_KEY | codex login --with-api-key
          # Disable Codex's bubblewrap sandbox via CONFIG (read by every
          # subcommand, incl. `review`). The CLI's
          # `--dangerously-bypass-approvals-and-sandbox` is a GLOBAL flag that
          # does NOT propagate to the `review` subcommand's command-execution
          # sandbox, so `codex review` still tries bwrap — which fails on GHA
          # runners (nested user/net namespaces blocked: bwrap can't bring up
          # loopback, `RTM_NEWADDR: Operation not permitted`), making every
          # git/shell command error and Codex emit a "could not inspect the
          # diff" apology instead of findings. The config keys ARE honored by
          # `review`. Equivalent to `-s danger-full-access` + `-a never`.
          # Safe here: the runner is an ephemeral isolated VM and review.py
          # already passes Codex a narrow env (no AIR_BOT_TOKEN / ANTHROPIC key).
          mkdir -p ~/.codex
          # Overwrite (not append) — this step owns the file; the keys are
          # static. Appending could leave a duplicate `sandbox_mode` if a
          # future codex/warm runner pre-creates config.toml, and TOML
          # duplicate-key handling is parser-dependent (could silently
          # re-enable bwrap). Overwrite is deterministic.
          printf 'sandbox_mode = "danger-full-access"\napproval_policy = "never"\n' > ~/.codex/config.toml
          # Non-fatal runtime/config/auth diagnostic — surfaces sandbox + auth
          # health in the job log if Codex still misbehaves.
          codex doctor || true
          # Model observability: air passes no --model and the config above pins
          # none, so `codex review` uses the CLI/account default (the catalog's
          # top-priority model). Record it so every run's log shows which model
          # actually ran. Zero-inference (catalog fetch only); non-fatal — an
          # older CLI without `debug models` just prints a bump hint.
          echo "[codex-model] config pin: $(grep -E '^[[:space:]]*model[[:space:]]*=' ~/.codex/config.toml 2>/dev/null || echo 'none (CLI/account default)')"
          codex debug models 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); ms=sorted(d.get('models',[]),key=lambda m:m.get('priority',999)); print('[codex-model] default (top-priority):', ms[0]['slug'], '.', ms[0].get('display_name')) if ms else print('[codex-model] catalog empty'); print('[codex-model] catalog:', ', '.join(m.get('slug','?') for m in ms[:6]))" || echo "[codex-model] 'codex debug models' unavailable on this codex CLI — bump the pin to observe the model"

      - name: Run review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIR_BOT_TOKEN: ${{ secrets.AIR_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ env.PR_NUMBER_RESOLVED }}
          CLOSED: ${{ inputs.closed }}
          NO_CODEX: ${{ inputs.no_codex }}
          FRESH: ${{ inputs.fresh }}
          AIR_AGENT_VERSIONS: ${{ inputs.agent_versions }}
          AIR_EXPECTED_REVIEWER: ${{ inputs.expected_reviewer }}
          # Resolved from a caller repo/org VARIABLE first, then the input,
          # then 'full'. `vars` in a reusable workflow reads the CALLER's
          # repo+org variables, so a caller sets AIR_REVIEW_MODE=messages-api
          # (no workflow edit) and deletes it to
          # revert. The variable wins because callers commonly pass a literal
          # `review_mode: ${{ inputs.review_mode || 'full' }}`, which would
          # otherwise pin the input to 'full' on review_requested events. An
          # invalid value fails loud — review.py validates the mode.
          AIR_REVIEW_MODE: ${{ vars.AIR_REVIEW_MODE || inputs.review_mode || 'full' }}
          # Enabled by the input OR a caller-repo/org variable. `vars` in a
          # reusable workflow resolves to the CALLER's repository + org
          # variables, so a caller can flip AIR_PROMOTE_FASTPATH=true in
          # Settings → Variables to turn this on with no workflow edit / PR.
          AIR_PROMOTE_FASTPATH: ${{ (inputs.promote_fastpath == 'true' || vars.AIR_PROMOTE_FASTPATH == 'true') && 'true' || 'false' }}
          # Multiagent workspace-handoff (PR6' migration, EXPERIMENTAL —
          # default off). Caller repo/org VARIABLE only, same vars
          # mechanism as above: set AIR_MULTIAGENT=1 in Settings →
          # Variables to route full mode through air-coordinator-ma
          # (GA roster, shared /workspace, ≈ −65–80% session cost in the
          # 2026-06-11 A/B); delete the variable to roll back instantly.
          AIR_MULTIAGENT: ${{ vars.AIR_MULTIAGENT }}
          # Optional cheaper/faster MA coordinator tier (default off). Caller
          # repo/org VARIABLE: set AIR_MA_COORDINATOR_MODEL=haiku (with
          # AIR_MULTIAGENT=1) to route the coordinator — a pure delegate+relay
          # layer — to a separate air-coordinator-ma-<alias> agent. ~15% faster,
          # relay-safe (validated), NOT a gate-safety change; delete to roll back.
          AIR_MA_COORDINATOR_MODEL: ${{ vars.AIR_MA_COORDINATOR_MODEL }}
          # Re-review severity-pin + deferred-findings ledger. Default ON
          # (review.py treats unset/empty as enabled); set a caller repo/org
          # VARIABLE AIR_LEDGER_PIN=0 in Settings → Variables to disable the
          # deterministic carry-forward guard fleet-lessly. Fails closed, so
          # disabling only removes the guard — it never breaks a review.
          AIR_LEDGER_PIN: ${{ vars.AIR_LEDGER_PIN }}
          # Fresh-gate exposure floor. Default ON (review.py treats unset/empty
          # as enabled); set a caller repo/org VARIABLE AIR_CATEGORY_FLOOR=0 in
          # Settings → Variables to disable the deterministic "active exposure =
          # blocker" floor fleet-lessly. Inert on tag-less review bodies, so
          # disabling is byte-identical to the pre-floor gate.
          AIR_CATEGORY_FLOOR: ${{ vars.AIR_CATEGORY_FLOOR }}
          # Advisory / no-approve gate mode. Default OFF. Set a caller repo/org
          # VARIABLE AIR_NO_APPROVE=1 (Settings → Variables) so air still submits
          # REQUEST_CHANGES on blockers but posts a neutral COMMENT (never APPROVE)
          # on a clean review — for a repo where a bot approval isn't yet
          # sanctioned. Read by verdict.resolve_verdict_event in review.py +
          # headless.py (same subprocess env). Delete the variable to restore
          # normal APPROVE/REQUEST_CHANGES gating.
          AIR_NO_APPROVE: ${{ vars.AIR_NO_APPROVE }}
          # Cron-sole learn: when the out-of-band learn cron (air-learn-cron.yml)
          # is the sole learn executor for this repo, the review job only BUMPS the
          # learn counter (no lock claim, no inline learn) so the cron can fire it
          # off the PR critical path. Set the SAME repo/org VARIABLE
          # AIR_LEARN_CRON_LIVE=true on BOTH this review caller and the cron caller.
          # Off/unset → the review runs learn inline on threshold (default).
          AIR_LEARN_CRON_LIVE: ${{ vars.AIR_LEARN_CRON_LIVE }}
          # Direct-post: post the verifier's body verbatim instead of the
          # coordinator's relay (bypasses the relay-drop failure mode for any
          # coordinator model). Default ON for MA full; set a caller repo/org
          # VARIABLE AIR_POST_VERIFIER_BODY=0 to opt OUT. An unset var passes ""
          # through, which review.py reads as ON. Safe-by-construction — falls
          # back to the coordinator relay on any ambiguity.
          AIR_POST_VERIFIER_BODY: ${{ vars.AIR_POST_VERIFIER_BODY }}
          # Absolute path to the local checkout. review.py uses it for
          # both `codex review` (when enabled) and client-side
          # pre-computation (blame/churn/file-status/diff-check
          # summaries embedded in the PR Context). Set whenever the
          # target-repo checkout step ran (PR_NUMBER_RESOLVED != '');
          # empty otherwise so review.py skips both legs gracefully.
          AIR_TARGET_REPO: ${{ env.PR_NUMBER_RESOLVED != '' && format('{0}/target-repo', github.workspace) || '' }}
        run: |
          cd air
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR number available. Pass pr_number via workflow_dispatch or use a pull_request trigger." >&2
            exit 1
          fi
          FLAGS=()
          if [ "$CLOSED" = "true" ]; then
            FLAGS+=(--closed)
          fi
          if [ "$NO_CODEX" = "true" ]; then
            FLAGS+=(--no-codex)
          fi
          if [ "$FRESH" = "true" ]; then
            FLAGS+=(--fresh)
          fi
          python managed/review.py "$REPO" "$PR_NUMBER" "${FLAGS[@]}"

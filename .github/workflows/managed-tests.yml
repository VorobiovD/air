name: managed tests

# Runs the pure, network-free unit tests under managed/ (test-*.py). These
# import review.py / setup.py / render_store_to_wiki.py, so they need the
# managed deps installed — but they make no API calls (seams are mocked) and
# need no secrets. Mirrors air-lib-tests.yml for the plugins/air/lib suite.
on:
  pull_request:
    paths:
      - 'managed/**'
      # The managed tests import plugins/air/lib (verdict via the shim, headless →
      # tool_exec/agent_loop, test-agent-md → agent_md), so a lib change can break
      # them — trigger on it too.
      - 'plugins/air/lib/**'
      - '.github/workflows/managed-tests.yml'
  push:
    branches: [main]
    paths:
      - 'managed/**'
      - 'plugins/air/lib/**'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install managed deps + pytest
        run: pip install -r managed/requirements.txt pytest

      - name: Run pure managed tests
        working-directory: managed
        # Auto-collect EVERY test-*.py (pyproject's python_files makes the
        # hyphenated suites collectable) so a new suite can't silently drop off
        # a hand-list — the exact bug that hid test-gate-orphan.py's 17
        # gate-orphan tests from CI. Only test-session.py is excluded: it's the
        # live-API verification script (needs AIR_BOT_TOKEN + a real session),
        # not a network-free unit suite.
        run: python -m pytest . --ignore=test-session.py -v
